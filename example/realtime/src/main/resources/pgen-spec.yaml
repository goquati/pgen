databases:
- name: "base"
  tables:
  - name: "public.documents"
    columns:
    - name: "id"
      type: "uuid"
      defaultExpr: "gen_random_uuid()"
    - name: "owner_id"
      type:
        kind: "domain"
        ref: "public.user_id"
        base: "uuid"
    - name: "title"
      type:
        kind: "domain"
        ref: "public.non_empty_text"
        base: "text"
      nullable: true
    - name: "content"
      type: "bytea"
      nullable: true
    - name: "content_type"
      type: "text"
      defaultExpr: "'application/octet-stream'::text"
    - name: "metadata"
      type: "jsonb"
      defaultExpr: "'{}'::jsonb"
    - name: "tags"
      type:
        kind: "array"
        element: "text"
      defaultExpr: "'{}'::text[]"
    - name: "created_at"
      type: "timestamptz"
      defaultExpr: "now()"
    - name: "updated_at"
      type: "timestamptz"
      nullable: true
    primaryKey:
      name: "documents_pkey"
      columns:
      - "id"
    foreignKeys:
    - name: "documents_owner_id_fkey"
      targetTable: "public.users"
      references:
      - sourceColumn: "owner_id"
        targetColumn: "id"
    uniqueConstraints:
    - name: "documents_owner_title_unique"
    checkConstraints:
    - name: "documents_updated_after_created"
  - name: "public.flyway_schema_history"
    columns:
    - name: "installed_rank"
      type: "int4"
    - name: "version"
      type: "varchar"
      nullable: true
    - name: "description"
      type: "varchar"
    - name: "type"
      type: "varchar"
    - name: "script"
      type: "varchar"
    - name: "checksum"
      type: "int4"
      nullable: true
    - name: "installed_by"
      type: "varchar"
    - name: "installed_on"
      type: "timestamp"
      defaultExpr: "now()"
    - name: "execution_time"
      type: "int4"
    - name: "success"
      type: "bool"
    primaryKey:
      name: "flyway_schema_history_pk"
      columns:
      - "installed_rank"
  - name: "public.orders"
    columns:
    - name: "id"
      type:
        kind: "domain"
        ref: "public.order_id"
        base: "uuid"
    - name: "order_uuid"
      type: "uuid"
      defaultExpr: "gen_random_uuid()"
    - name: "user_id"
      type:
        kind: "domain"
        ref: "public.user_id"
        base: "uuid"
    - name: "product_id"
      type: "int4"
    - name: "status"
      type:
        kind: "enum"
        ref: "public.order_status"
      defaultExpr: "'PENDING'::order_status"
    - name: "total_cents"
      type: "int4"
    - name: "notes"
      type: "text"
      nullable: true
    - name: "placed_at"
      type: "timestamptz"
      defaultExpr: "now()"
    - name: "processed_at"
      type: "timestamp"
      nullable: true
    - name: "metadata"
      type: "jsonb"
      nullable: true
    - name: "raw_json_payload"
      type: "json"
      nullable: true
    - name: "receipt_pdf"
      type: "bytea"
      nullable: true
    - name: "tags"
      type:
        kind: "array"
        element: "text"
      nullable: true
    primaryKey:
      name: "orders_pkey"
      columns:
      - "id"
    foreignKeys:
    - name: "orders_product_fk"
      targetTable: "public.products"
      references:
      - sourceColumn: "product_id"
        targetColumn: "id"
    - name: "orders_user_fk"
      targetTable: "public.users"
      references:
      - sourceColumn: "user_id"
        targetColumn: "id"
    uniqueConstraints:
    - name: "orders_unique_order_uuid"
    checkConstraints:
    - name: "orders_processed_after_placed"
    - name: "orders_total_positive"
  - name: "public.products"
    columns:
    - name: "id"
      type: "int4"
      defaultExpr: "nextval('products_id_seq'::regclass)"
    - name: "sku"
      type: "text"
    - name: "name"
      type:
        kind: "domain"
        ref: "public.non_empty_text"
        base: "text"
    - name: "type"
      type:
        kind: "enum"
        ref: "public.product_type"
    - name: "description"
      type: "text"
      nullable: true
    - name: "price_cents"
      type: "int4"
    - name: "status"
      type:
        kind: "enum"
        ref: "public.order_status"
      defaultExpr: "'PENDING'::order_status"
    - name: "extra_data"
      type: "json"
      nullable: true
    - name: "created_at"
      type: "timestamp"
      defaultExpr: "now()"
    primaryKey:
      name: "products_pkey"
      columns:
      - "id"
    uniqueConstraints:
    - name: "products_sku_unique"
    checkConstraints:
    - name: "products_price_positive"
  - name: "public.users"
    columns:
    - name: "id"
      type:
        kind: "domain"
        ref: "public.user_id"
        base: "uuid"
      defaultExpr: "gen_random_uuid()"
    - name: "username"
      type:
        kind: "domain"
        ref: "public.non_empty_text"
        base: "text"
    - name: "email"
      type: "text"
      nullable: true
    - name: "display_name"
      type: "text"
      nullable: true
    - name: "roles"
      type:
        kind: "array"
        element: "text"
      defaultExpr: "ARRAY['user'::text]"
    - name: "preferences"
      type: "jsonb"
      defaultExpr: "'{}'::jsonb"
    - name: "created_at"
      type: "timestamptz"
      defaultExpr: "now()"
    - name: "last_login_at"
      type: "timestamptz"
      nullable: true
    primaryKey:
      name: "users_pkey"
      columns:
      - "id"
    uniqueConstraints:
    - name: "users_email_unique"
    - name: "users_username_unique"
    checkConstraints:
    - name: "users_roles_not_empty"
  enums:
  - name: "public.order_status"
    fields:
    - "PENDING"
    - "PAID"
    - "CANCELLED"
    - "REFUNDED"
  - name: "public.product_type"
    fields:
    - "A"
    - "B"
    - "C"
